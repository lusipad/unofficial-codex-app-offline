name: build-offline-package

on:
  workflow_dispatch:
    inputs:
      build_installer:
        description: Build the Inno Setup installer
        required: false
        default: true
        type: boolean
  schedule:
    - cron: '15 3 * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-offline-package.yml'
      - '.github/workflows/build-offline-package-monitor.yml'
      - 'config/**'
      - 'installer/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - 'vendor/**'

permissions:
  contents: write

concurrency:
  group: codex-offline-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install resolver dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Resolve source version
        id: source
        shell: pwsh
        run: |
          $metadata = & ./scripts/get-app-source-version.ps1 -ConfigPath 'config/offline-package.json' | ConvertFrom-Json
          "release_tag=$($metadata.releaseTag)" >> $env:GITHUB_OUTPUT
          "release_name=$($metadata.releaseName)" >> $env:GITHUB_OUTPUT
          "version=$($metadata.version)" >> $env:GITHUB_OUTPUT
          "package_id=$($metadata.packageId)" >> $env:GITHUB_OUTPUT
          "source_mode=$($metadata.sourceMode)" >> $env:GITHUB_OUTPUT
          if ($null -ne $metadata.packageFamilyName) {
            "package_family_name=$($metadata.packageFamilyName)" >> $env:GITHUB_OUTPUT
          }

      - name: Skip build when version already released
        id: release_check
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ steps.source.outputs.release_tag }}'
          $repo = '${{ github.repository }}'
          $existingReleaseUrl = gh release view $tag --repo $repo --json url --jq '.url' 2>$null

          if ($LASTEXITCODE -eq 0 -and -not [string]::IsNullOrWhiteSpace($existingReleaseUrl)) {
            "skip_build=true" >> $env:GITHUB_OUTPUT
            "existing_release_url=$existingReleaseUrl" >> $env:GITHUB_OUTPUT
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "Version $tag is already published at $existingReleaseUrl. Build and publish steps were skipped."
          }
          else {
            "skip_build=false" >> $env:GITHUB_OUTPUT
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "Version $tag is new. Build and publish steps will continue."
          }

          $global:LASTEXITCODE = 0
          exit 0

      - name: Ensure Inno Setup
        if: ${{ steps.release_check.outputs.skip_build != 'true' && (github.event_name != 'workflow_dispatch' || inputs.build_installer) }}
        shell: pwsh
        run: |
          if (-not (Get-Command ISCC.exe -ErrorAction SilentlyContinue)) {
            choco install innosetup --no-progress -y
          }

      - name: Build offline bundle
        if: ${{ steps.release_check.outputs.skip_build != 'true' }}
        shell: pwsh
        run: |
          $arguments = @(
            '-NoProfile',
            '-File',
            './scripts/build-offline-package.ps1',
            '-ConfigPath',
            'config/offline-package.json',
            '-MetadataOutputPath',
            'build-metadata.json'
          )

          if ('${{ github.event_name }}' -eq 'workflow_dispatch' -and '${{ inputs.build_installer }}' -eq 'false') {
            $arguments += '-SkipInstaller'
          }

          $process = Start-Process -FilePath 'pwsh' -ArgumentList $arguments -NoNewWindow -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "build-offline-package.ps1 failed with exit code $($process.ExitCode)."
          }

      - name: Read build metadata
        if: ${{ steps.release_check.outputs.skip_build != 'true' }}
        id: build
        shell: pwsh
        run: |
          $metadata = Get-Content 'build-metadata.json' -Raw | ConvertFrom-Json
          "release_tag=$($metadata.releaseTag)" >> $env:GITHUB_OUTPUT
          "release_name=$($metadata.releaseName)" >> $env:GITHUB_OUTPUT
          "artifact_dir=$($metadata.artifactDirectoryRelative)" >> $env:GITHUB_OUTPUT
          "version=$($metadata.version)" >> $env:GITHUB_OUTPUT
          "package_id=$($metadata.packageId)" >> $env:GITHUB_OUTPUT
          "generated_at=$($metadata.generatedAt)" >> $env:GITHUB_OUTPUT
          "source_mode=$($metadata.appSource.mode)" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifacts
        if: ${{ steps.release_check.outputs.skip_build != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.release_tag }}
          path: ${{ steps.build.outputs.artifact_dir }}
          if-no-files-found: error

      - name: Publish release assets
        if: ${{ steps.release_check.outputs.skip_build != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build.outputs.release_tag }}
          name: ${{ steps.build.outputs.release_name }}
          files: ${{ steps.build.outputs.artifact_dir }}/*
          overwrite_files: true
          body: |
            Source package: `${{ steps.build.outputs.package_id }}`
            Store version: `${{ steps.build.outputs.version }}`
            Source mode: `${{ steps.build.outputs.source_mode }}`
            Built at: `${{ steps.build.outputs.generated_at }}`

            Assets:
            - portable zip
            - setup exe
            - bundled skills zip
            - exported store snapshot zip
            - SHA256SUMS.txt
